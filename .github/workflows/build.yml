name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Verify Xcode
        run: |
          xcodebuild -version
          swift --version

      - name: Build iOS libraries
        run: |
          chmod +x build_ios_libs.sh
          ./build_ios_libs.sh

      - name: Build unsigned app
        run: |
          xcodebuild \
            -project app/SigmaDevelop.xcodeproj \
            -scheme SigmaDevelop \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            clean build

      - name: Create IPA
        run: |
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name "SigmaDevelop.app" -type d | head -n 1)

          mkdir Payload
          cp -R "$APP" Payload/
          zip -qry SigmaDevelop.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SigmaDevelop-ipa
          path: SigmaDevelop.ipa
