name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - name: Pull Git LFS for submodules
        run: |
          git lfs pull
          git submodule foreach --recursive git lfs pull || true

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Verify Xcode
        run: |
          xcodebuild -version
          swift --version

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios,aarch64-apple-ios-macabi,x86_64-apple-ios-macabi

      - name: Verify Rust
        run: |
          rustc --version
          cargo --version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install numpy scipy pillow

      - name: Optional noise profile generation
        run: |
          if [ -d dataset ] || ls *.x3f >/dev/null 2>&1; then
            echo "Building noise profile from dataset..."
            python scripts/noise_profile.py
          else
            echo "Using committed NoiseProfiles.generated.swift"
          fi

      - name: Build native libraries
        run: |
          chmod +x build_libs.sh
          chmod +x develop/build_metallib.sh
          chmod +x build_ios_libs.sh

          echo "Step 1: Building Rust CLI and static library..."
          ./build_libs.sh

          echo "Step 2: Building Metal libraries..."
          ./develop/build_metallib.sh

          echo "Step 3: Building iOS xcframework..."
          ./build_ios_libs.sh

      - name: Verify generated libraries
        run: |
          echo "==== XCFRAMEWORKS ===="
          find . -name "*.xcframework" -type d

          echo
          echo "==== STATIC LIBRARIES ===="
          find . -name "libsd14raw.a" 2>/dev/null

          echo
          echo "==== METAL LIBRARIES ===="
          find . -name "*.metallib" -type f

          echo
          echo "==== GENERATED RESOURCES ===="
          find develop/Sources/SigmaFoveon/Resources -type f 2>/dev/null || echo "No resources found"

      - name: Build SigmaFoveon framework
        run: |
          echo "Building SigmaFoveon Swift package for iOS..."
          cd develop
          swift build -c release --destination generic/platform=ios
          cd ..

      - name: Build app without signing
        run: |
          echo "Building app with unsigned code signing..."
          xcodebuild build \
            -project app/SigmaDevelop.xcodeproj \
            -scheme SigmaDevelop \
            -configuration Release \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            OTHER_LDFLAGS="-ObjC -lsd14raw" \
            IPHONEOS_DEPLOYMENT_TARGET=15.0

      - name: Archive unsigned app
        run: |
          echo "Creating archive..."
          xcodebuild archive \
            -project app/SigmaDevelop.xcodeproj \
            -scheme SigmaDevelop \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/SigmaDevelop.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            OTHER_LDFLAGS="-ObjC -lsd14raw" \
            IPHONEOS_DEPLOYMENT_TARGET=15.0

      - name: Inspect archive contents
        run: |
          APP="build/SigmaDevelop.xcarchive/Products/Applications/SigmaDevelop.app"

          echo "App path:"
          echo "$APP"

          echo
          echo "==== APP EXECUTABLE ===="
          ls -lh "$APP/SigmaDevelop"
          file "$APP/SigmaDevelop"

          echo
          echo "==== APP SIZE ===="
          du -sh "$APP"

          echo
          echo "==== FRAMEWORKS EMBEDDED ===="
          find "$APP/Frameworks" -type f 2>/dev/null || echo "No frameworks found"

          echo
          echo "==== DYLIBS ===="
          find "$APP" -name "*.dylib" 2>/dev/null || echo "No dylibs"

      - name: Create IPA from archive
        run: |
          echo "Creating IPA from archive..."
          cd build
          mkdir -p Payload
          cp -R SigmaDevelop.xcarchive/Products/Applications/SigmaDevelop.app Payload/
          cd Payload
          zip -qry ../SigmaDevelop.ipa .
          cd ..
          rm -rf Payload
          cd ..

          echo "==== IPA CREATED ===="
          ls -lh build/SigmaDevelop.ipa
          unzip -l build/SigmaDevelop.ipa | head -30

      - name: Verify IPA structure
        run: |
          echo "==== IPA STRUCTURE VALIDATION ===="
          unzip -t build/SigmaDevelop.ipa | tail -5

          echo
          echo "==== APP BINARY IN IPA ===="
          unzip -l build/SigmaDevelop.ipa | grep -E "SigmaDevelop|\.dylib|\.framework" | head -20

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SigmaDevelop-unsigned
          path: build/SigmaDevelop.ipa
          if-no-files-found: error
