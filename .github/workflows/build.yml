name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Verify Xcode
        run: |
          xcodebuild -version
          swift --version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Use a stable python version

      - name: Generate Film Sims and Noise Profiles
        run: |
          # The README specifies these dependencies for the generation scripts
          pip install numpy scipy
          
          # Generates .lut resources + FilmStocks.generated.swift
          python scripts/filmsim_bake.py
          
          # Generates NoiseProfiles.generated.swift
          python scripts/noise_profile.py

      - name: Build Core Dependencies and Shaders
        run: |
          chmod +x build_libs.sh
          chmod +x develop/build_metallib.sh
          chmod +x build_ios_libs.sh
          
          # Builds Kalpanika/x3f, libvips, and C/C++ engine dependencies
          ./build_libs.sh
          
          # Compiles Metal shaders into a .metallib binary
          ./develop/build_metallib.sh
          
          # Bundles everything for iOS architectures
          ./build_ios_libs.sh

      - name: Build unsigned app
        run: |
          xcodebuild \
            -project app/SigmaDevelop.xcodeproj \
            -scheme SigmaDevelop \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            clean build

      - name: Create IPA
        run: |
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name "SigmaDevelop.app" -type d | head -n 1)

          mkdir Payload
          cp -R "$APP" Payload/
          zip -qry SigmaDevelop.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SigmaDevelop-ipa
          path: SigmaDevelop.ipa
