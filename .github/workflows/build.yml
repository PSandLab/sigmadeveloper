name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: List available Xcode versions
        run: ls /Applications | grep Xcode

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.3.app  # confirm from step above

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios,aarch64-apple-darwin,x86_64-apple-darwin

      - name: Build native libs (Rust xcframework + metallibs)
        run: |
          chmod +x build_ios_libs.sh develop/build_metallib.sh
          ./build_ios_libs.sh
          ./develop/build_metallib.sh

      - name: Build app (unsigned)
        run: |
          xcodebuild build \
            -project app/SigmaDevelop.xcodeproj \
            -scheme SigmaDevelop \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          APP_PATH=$(find build/DerivedData -name "SigmaDevelop.app" -type d | head -1)
          [ -n "$APP_PATH" ] || { echo "app not found"; exit 1; }
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/SigmaDevelop.app
          zip -qry SigmaDevelop.ipa Payload
          ls -lh SigmaDevelop.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SigmaDevelop-unsigned
          path: SigmaDevelop.ipa
          if-no-files-found: error
