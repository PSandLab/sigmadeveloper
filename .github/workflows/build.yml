name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - name: Pull Git LFS for submodules
        run: |
          git lfs pull
          git submodule foreach --recursive git lfs pull || true

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Verify Xcode
        run: |
          xcodebuild -version
          swift --version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Optional noise profile generation
        run: |
          pip install numpy scipy

          if [ -d dataset ] || ls *.x3f >/dev/null 2>&1; then
            python scripts/noise_profile.py
          else
            echo "Using committed NoiseProfiles.generated.swift"
          fi

      - name: Build native libraries
        run: |
          chmod +x build_libs.sh
          chmod +x develop/build_metallib.sh
          chmod +x build_ios_libs.sh

          ./build_libs.sh
          ./develop/build_metallib.sh
          ./build_ios_libs.sh

      - name: Verify generated libraries
        run: |
          echo "==== XCFRAMEWORKS ===="
          find . -name "*.xcframework"

          echo
          echo "==== STATIC LIBRARIES ===="
          find . -name "*.a"

          echo
          echo "==== METAL LIBRARIES ===="
          find . -name "*.metallib"

          echo
          echo "==== GENERATED RESOURCES ===="
          find develop/Sources/SigmaFoveon/Resources -type f || true

      - name: Archive unsigned app
        run: |
          xcodebuild archive \
            -project app/SigmaDevelop.xcodeproj \
            -scheme SigmaDevelop \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/SigmaDevelop.xcarchive \
            CODE_SIGNING_ALLOWED=NO

      - name: Inspect archived app
        run: |
          APP="build/SigmaDevelop.xcarchive/Products/Applications/SigmaDevelop.app"

          echo "App path:"
          echo "$APP"

          echo
          echo "==== APP CONTENTS ===="
          find "$APP"

      - name: Create IPA
        run: |
          mkdir Payload
          cp -R build/SigmaDevelop.xcarchive/Products/Applications/SigmaDevelop.app Payload/
          cd Payload
          zip -qry ../SigmaDevelop.ipa .
          cd ..

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SigmaDevelop-unsigned
          path: SigmaDevelop.ipa
